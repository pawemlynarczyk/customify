<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podgląd: monit limitu (formularz) – demo</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; background: #e8eaf0; }
    .hint { text-align: center; padding: 12px; font-size: 13px; color: #555; background: #fff3cd; border-bottom: 1px solid #ffc107; }
    .hint a { color: #1565c0; }
  </style>
</head>
<body>
  <p class="hint">
    To jest <strong>tylko podgląd wyglądu</strong> — nic nie wysyła, nie zużywa generacji.
    <a href="/demo-limit-wall-modal-second.html">Zobacz wariant „kolejna ściana” (bez formularza)</a>
  </p>

  <!-- Kopia układu z customify.js — showLimitWallModal, pierwsza ściana -->
  <div id="limitWallModal" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center;
    z-index: 99999; padding: 16px; box-sizing: border-box;
  ">
    <div style="
      background: white; padding: 32px 26px; border-radius: 16px; max-width: 520px; width: 100%;
      text-align: left; box-shadow: 0 20px 60px rgba(0,0,0,0.4); position: relative; max-height: 90vh; overflow-y: auto;
    ">
      <button type="button" onclick="history.back()" style="
        position: absolute; top: 10px; right: 10px; background: transparent; border: none;
        font-size: 24px; color: #999; cursor: pointer; width: 32px; height: 32px; line-height: 1;
      " aria-label="Zamknij">×</button>
      <h2 style="margin: 0 0 12px; color: #333; font-size: 18px; font-weight: 600;">Odbierz darmowe generacje</h2>
      <p style="margin: 0 0 18px; color: #666; font-size: 15px; line-height: 1.55;">
        Wykorzystałeś dostępne generacje. Napisz, co możemy poprawić — w ciągu ok. 5 minut wyślemy maila i doładujemy 4 kolejne generacje.
      </p>

      <form id="limitWallForm" onsubmit="event.preventDefault(); alert('To jest demo — nic nie zostało wysłane.');">
        <label style="display:block; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 6px;">
          Co chciałbyś poprawić w obrazku? <span style="color:#c00">*</span>
        </label>
        <textarea name="fixImage" required minlength="10" rows="3" style="
          width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
          font-size: 14px; margin-bottom: 14px; resize: vertical; font-family: inherit;
        " placeholder="Np. twarz, kolorystyka, tło…"></textarea>

        <label style="display:block; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 6px;">
          Nie ma prezentu którego szukasz? Jakiego?
        </label>
        <textarea name="giftSearch" rows="2" style="
          width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
          font-size: 14px; margin-bottom: 14px; resize: vertical; font-family: inherit;
        " placeholder="Opcjonalnie — pomoże nam dopasować ofertę"></textarea>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end;">
          <button type="button" onclick="history.back()" style="
            background: #f5f5f5; color: #666; padding: 12px 22px; border-radius: 8px; border: 2px solid #ddd;
            font-weight: 600; font-size: 15px; cursor: pointer;
          ">Zamknij</button>
          <button type="submit" style="
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 12px 22px; border-radius: 8px; border: none;
            font-weight: 600; font-size: 15px; cursor: pointer;
          ">Wyślij i doładuj konto</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
