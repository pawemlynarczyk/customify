<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podgląd: monit limitu (kolejna ściana) – demo</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; background: #e8eaf0; }
    .hint { text-align: center; padding: 12px; font-size: 13px; color: #555; background: #e3f2fd; border-bottom: 1px solid #90caf9; }
    .hint a { color: #1565c0; }
  </style>
</head>
<body>
  <p class="hint">
    Demo — wariant <strong>bez formularza</strong> (po wcześniejszym doładowaniu).
    <a href="/demo-limit-wall-modal.html">← Wariant z formularzem</a>
  </p>

  <div id="limitWallModal" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center;
    z-index: 99999; padding: 16px; box-sizing: border-box;
  ">
    <div style="
      background: white; padding: 32px 26px; border-radius: 16px; max-width: 520px; width: 100%;
      text-align: left; box-shadow: 0 20px 60px rgba(0,0,0,0.4); position: relative; max-height: 90vh; overflow-y: auto;
    ">
      <button type="button" onclick="history.back()" style="
        position: absolute; top: 10px; right: 10px; background: transparent; border: none;
        font-size: 24px; color: #999; cursor: pointer; width: 32px; height: 32px; line-height: 1;
      " aria-label="Zamknij">×</button>
      <h2 style="margin: 0 0 12px; color: #333; font-size: 18px; font-weight: 600;">Limit generacji</h2>
      <p style="margin: 0 0 22px; color: #555; font-size: 15px; line-height: 1.55;">
        Wykorzystałeś wszystkie dostępne transformacje (4/4). Następnego dnia możemy zwiększyć limit i wyślemy Ci maila z informacją.
      </p>
      <div style="text-align: right;">
        <button type="button" onclick="history.back()" style="
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white; padding: 12px 22px; border-radius: 8px; border: none;
          font-weight: 600; font-size: 15px; cursor: pointer;
        ">Rozumiem</button>
      </div>
    </div>
  </div>
</body>
</html>
