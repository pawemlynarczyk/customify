<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customify API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-width: 480px;
            text-align: center;
        }
        h1 { font-size: 2rem; margin-bottom: 12px; color: #4a5568; }
        p { color: #718096; line-height: 1.6; margin-bottom: 24px; }
        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Customify API</h1>
        <p>Backend do personalizacji obrazów AI. Integracja z <a href="https://lumly.pl">lumly.pl</a>.</p>
        <p style="font-size: 0.9rem; color: #a0aec0;">Strona testowa niedostępna publicznie.</p>
    </div>
</body>
</html>
